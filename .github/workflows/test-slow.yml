name: Run slow TS tests
on:
  schedule:
    - cron: '0 12 * * 1,4' # 06:00 bi-weekly (mon, thu)
  workflow_dispatch:
jobs:
  slow:
    name: Slow large input tests
    uses: paulmillr/jsbt/.github/workflows/test-ts-slow.yml@8a0e8bacab177cbe72ee412345d42331cfc0a261
    with:
      npm-task: test:slow
  dos:
    name: Slow DoS tests
    uses: paulmillr/jsbt/.github/workflows/test-ts-slow.yml@8a0e8bacab177cbe72ee412345d42331cfc0a261
    with:
      npm-task: test:dos
  acvp:
    name: Slow ACVP tests
    uses: paulmillr/jsbt/.github/workflows/test-ts-slow.yml@8a0e8bacab177cbe72ee412345d42331cfc0a261
    with:
      npm-task: test:acvp
  kdf:
    name: Slow KDF tests
    uses: paulmillr/jsbt/.github/workflows/test-ts-slow.yml@8a0e8bacab177cbe72ee412345d42331cfc0a261
    with:
      npm-task: test:kdf
